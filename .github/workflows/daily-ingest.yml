name: Daily airfare ingest

on:
  schedule:
    # 21:45 UTC is 05:45 in Perth (AWST, UTC+8), before the day gets busy
    - cron: "45 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch prices from the Aviasales Data API
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
        run: python src/fetch_prices.py

      - name: Commit and push new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "data: daily snapshot $(date -u +%F)"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          fi
